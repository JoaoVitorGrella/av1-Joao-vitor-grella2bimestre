<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Simples</title>

    <style>
       body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    margin: 0;
}

h3 {
    margin-bottom: 15px;
}

form {
    background-color: white;
    padding: 20px;
    width: 320px;

    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

input,
textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 12px;

    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;

    background-color: #4a90e2;
    color: white;

    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #357abd;
}

a {
    margin-top: 15px;
    text-decoration: none;
    color: #4a90e2;
}

a:hover {
    text-decoration: underline;
}
    </style>
</head>
<body>

    <h3>Contato</h3>

    <form>
        Nome:<br>
        <input type="text" name="nome">

        Email:<br>
        <input type="email" name="email">

        Mensagem:<br>
        <textarea rows="4"></textarea>

        <button type="submit">Enviar</button>
    </form>

    <br>

    <a href="index.html">Voltar</a>

</body>
</html>
